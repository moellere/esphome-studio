# Kubernetes deployment manifest for wirestudio.
#
#   kubectl apply -f deploy/k8s.yaml
#
# What this gives you:
#   - One Deployment running the published image at 8765/tcp inside
#     the cluster.
#   - A PVC (1 Gi) mounted at /data for sessions/ + designs/.
#   - A ClusterIP Service on :80 -> :8765.
#   - A Secret stub (commented out) showing where the optional API
#     keys plug in. Apply it as a real Secret separately so it never
#     lands in your git history.
#
# Constraints to be aware of:
#   - Single replica, Recreate strategy. The studio's persistence
#     (sessions JSONL + designs JSON files) is file-on-disk and not
#     safe across multiple writers. RWX volumes don't help -- the
#     file format itself isn't multi-writer.
#   - The image runs as a non-root `appuser` (uid 1000); the pod's
#     securityContext below pins that explicitly + forbids privilege
#     escalation, so the manifest is PSS-Restricted-friendly.

---
# Optional: wirestudio-secrets. Apply this with real values out-of-band:
#
#   kubectl create secret generic wirestudio-secrets \
#     --from-literal=anthropic-api-key=sk-ant-... \
#     --from-literal=fleet-url=http://homeassistant.local:8765 \
#     --from-literal=fleet-token=xxx \
#     --from-literal=thingiverse-api-key=xxx
#
# All keys are optional; the studio runs without any of them, just
# with the corresponding feature gated off.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wirestudio-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  # storageClassName: <your-default>     # uncomment to override

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wirestudio
  labels:
    app: wirestudio
spec:
  replicas: 1
  strategy:
    # File-on-disk state -> Recreate so the old pod releases the PVC
    # before the new one tries to mount it.
    type: Recreate
  selector:
    matchLabels: { app: wirestudio }
  template:
    metadata:
      labels: { app: wirestudio }
    spec:
      securityContext:
        runAsNonRoot: true
        # Default UID assigned to 'appuser' when it is created
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: wirestudio
          image: ghcr.io/moellere/wirestudio:v0.9.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - { name: http, containerPort: 8765 }
          env:
            # All four envFrom entries are `optional: true` so the pod
            # starts even when the secret is absent. Each one gates a
            # specific feature; missing-secret = feature disabled.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wirestudio-secrets
                  key: anthropic-api-key
                  optional: true
            - name: FLEET_URL
              valueFrom:
                secretKeyRef:
                  name: wirestudio-secrets
                  key: fleet-url
                  optional: true
            - name: FLEET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wirestudio-secrets
                  key: fleet-token
                  optional: true
            - name: THINGIVERSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wirestudio-secrets
                  key: thingiverse-api-key
                  optional: true
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              # uvicorn + the Anthropic SDK can spike during streaming;
              # 512 Mi is comfortable for a single-user studio.
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wirestudio-data

---
apiVersion: v1
kind: Service
metadata:
  name: wirestudio
  labels: { app: wirestudio }
spec:
  type: ClusterIP
  selector: { app: wirestudio }
  ports:
    - { name: http, port: 80, targetPort: http }

# Ingress is intentionally not included -- ingress controllers (nginx,
# traefik, cilium, gateway-api) vary too much for a one-size-fits-all
# default. A typical nginx-ingress Ingress would look like:
#
# apiVersion: networking.k8s.io/v1
# kind: Ingress
# metadata:
#   name: wirestudio
#   annotations:
#     # SSE log streaming wants no buffering on the proxy:
#     nginx.ingress.kubernetes.io/proxy-buffering: "off"
#     nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
# spec:
#   ingressClassName: nginx
#   tls:
#     - hosts: [studio.example.com]
#       secretName: studio-tls
#   rules:
#     - host: studio.example.com
#       http:
#         paths:
#           - path: /
#             pathType: Prefix
#             backend:
#               service:
#                 name: wirestudio
#                 port: { number: 80 }
