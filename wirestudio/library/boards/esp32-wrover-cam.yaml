id: esp32-wrover-cam
name: ESP32-WROVER-CAM (Freenove-style)
mcu: esp32
chip_variant: esp32
framework: arduino
platformio_board: esp-wrover-kit
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

# ESP32-WROVER module + OV2640 with the WROVER-style pinout (used by
# Freenove ESP32-WROVER-CAM and similar boards). Different camera
# pinout from the AI-Thinker -- in particular the camera I2C runs on
# GPIO13/12 and XCLK on GPIO32, which frees up GPIO26/27 for general
# IO.
#
# Camera bus (claimed):
#   GPIO32 = XCLK
#   GPIO13 = SIOD (camera I2C SDA)
#   GPIO12 = SIOC (camera I2C SCL) -- also boot strap (LOW for 3.3V flash)
#   GPIO5  = D1
#   GPIO14 = D2 (also strap)
#   GPIO4  = D3
#   GPIO15 = D4 (also strap)
#   GPIO18 = D5
#   GPIO23 = D6
#   GPIO36 = D7 (input-only)
#   GPIO39 = D8 (input-only)
#   GPIO27 = VSYNC
#   GPIO25 = HREF
#   GPIO19 = PCLK
#   GPIO26 = PWDN
#
# Free for user IO: GPIO0 (boot), GPIO1 (TX), GPIO2 (strap), GPIO3
# (RX), GPIO16, GPIO17, GPIO21, GPIO22, GPIO33, GPIO34 (input-only),
# GPIO35 (input-only).
gpio_capabilities:
  GPIO0:  [boot, strap, boot_high, adc, adc2]
  GPIO1:  [gpio, uart_tx, serial_tx]
  GPIO2:  [strap, gpio, boot_low, adc, adc2]
  GPIO3:  [gpio, uart_rx, serial_rx]
  GPIO4:  [gpio, camera_data, adc, adc2, pwm]
  GPIO5:  [gpio, camera_data, strap, boot_high]
  GPIO12: [gpio, camera_scl, strap, boot_low, adc, adc2]
  GPIO13: [gpio, camera_sda, adc, adc2, pwm]
  GPIO14: [gpio, camera_data, adc, adc2, pwm, strap]
  GPIO15: [gpio, camera_data, adc, adc2, strap, boot_high]
  GPIO16: [gpio]
  GPIO17: [gpio]
  GPIO18: [gpio, camera_data]
  GPIO19: [gpio, camera_pclk]
  GPIO21: [gpio]
  GPIO22: [gpio]
  GPIO23: [gpio, camera_data]
  GPIO25: [gpio, camera_href, dac, adc, adc2]
  GPIO26: [gpio, camera_pwdn, dac, adc, adc2]
  GPIO27: [gpio, camera_vsync, adc, adc2, pwm]
  GPIO32: [gpio, camera_xclk, adc, adc1, pwm]
  GPIO33: [gpio, adc, adc1, pwm]
  GPIO34: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
  GPIO35: [gpio, adc, adc1, input_only, no_pull_internal]
  GPIO36: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
  GPIO39: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
# KiCad symbol mapping (0.9). Generic single-row header fallback.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x14
  value: ESP32-WROVER-CAM
