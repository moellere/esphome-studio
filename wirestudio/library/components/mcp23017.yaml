id: mcp23017
name: Microchip MCP23017 (16-bit I2C GPIO expander)
category: io_expander
use_cases: [gpio_expansion, switch_inputs, led_outputs, security_sensors]
aliases: [mcp23018]

electrical:
  vcc_min: 1.8
  vcc_max: 5.5
  current_ma_typical: 1
  current_ma_peak: 65
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - role: SDA
      kind: i2c_sda
      pull_up: {required: true, value: "4.7k", to: VCC}
    - role: SCL
      kind: i2c_scl
      pull_up: {required: true, value: "4.7k", to: VCC}
    - {role: RESET, kind: digital_in, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [i2c]
  # ESPHome 2024+ unifies the 8- and 16-bit MCP variants under a single
  # `mcp23xxx:` discriminator key on downstream pin blocks. Without this,
  # the generator would emit `pin: { mcp23017: <id>, ... }`, which
  # `esphome config` rejects.
  expander_pin_key: mcp23xxx
  yaml_template: |
    mcp23017:
      - id: {{ id }}
        address: "{{ params.address | default('0x20') }}"
        i2c_id: {{ bus.id }}

params_schema:
  address:
    type: string
    enum: ["0x20", "0x21", "0x22", "0x23", "0x24", "0x25", "0x26", "0x27"]
    default: "0x20"

notes: "16 GPIOs (A0-A7, B0-B7) addressable as numbers 0-15. Per-pin direction is configured by downstream gpio platforms via expander_pin connections."
# KiCad symbol mapping (0.9 schematic export).
kicad:
  symbol_lib: Interface_Expansion
  symbol: MCP23017_SP
  pin_map:
    VCC: VDD
