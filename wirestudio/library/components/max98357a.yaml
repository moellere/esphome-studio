id: max98357a
name: Maxim MAX98357A I2S Class-D mono amp + DAC
category: audio_dac
use_cases: [audio_output, media_player, speaker_driver]
aliases: [pcm5102, generic_i2s_dac]

electrical:
  vcc_min: 2.5
  vcc_max: 5.5
  current_ma_typical: 50
  current_ma_peak: 1400
  pins:
    - {role: VCC,   kind: power}
    - {role: GND,   kind: ground}
    - {role: LRCLK, kind: i2s_lrclk}
    - {role: BCLK,  kind: i2s_bclk}
    - {role: DIN,   kind: i2s_dout, voltage: 3.3}
    - {role: SD,    kind: digital_in, voltage: 3.3}
    - {role: GAIN,  kind: analog_in,  voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}
    - {kind: capacitor, value: "10uF",  between: [VCC, GND], purpose: bulk decoupling}

esphome:
  required_components: [i2s_audio]
  yaml_template: |
    media_player:
      - platform: i2s_audio
        name: "{{ label }}"
        id: {{ id }}
        dac_type: external
        i2s_dout_pin: {{ pins.DIN | tojson }}
        mode: {{ params.mode | default('mono') }}

params_schema:
  mode: { type: string, enum: [mono, stereo, left, right], default: "mono" }

notes: "MAX98357A is mono Class-D. For stereo use two boards with one wired left, one right -- ESPHome doesn't support that yet (one media_player per device). DIN, BCLK, LRCLK come from the i2s_audio bus and i2s_dout_pin connection. SD pin (shutdown) is optional; tie high or omit for always-on."
# KiCad symbol mapping (0.9 schematic export). KiCad bundles MAX98357A
# in the Amplifier_Audio library for newer releases; older installs
# may need an alias or an external addon library.
kicad:
  symbol_lib: Amplifier_Audio
  symbol: MAX98357A
  pin_map:
    VCC: VDD
