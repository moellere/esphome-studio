id: tm1638
name: TM1638 8-digit 7-segment + 8 LEDs + 8 buttons
category: display
use_cases: [seven_segment, status, button_input, led_output]
aliases: [tm1638plus, led_and_key]

electrical:
  vcc_min: 3.0
  vcc_max: 5.5
  current_ma_typical: 30
  current_ma_peak: 80
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - {role: STB, kind: digital_out, voltage: 3.3}
    - {role: CLK, kind: digital_out, voltage: 3.3}
    - {role: DIO, kind: digital_out, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: []
  yaml_template: |
    display:
      platform: tm1638
      id: {{ id }}
      stb_pin: {{ pins.STB | tojson }}
      clk_pin: {{ pins.CLK | tojson }}
      dio_pin: {{ pins.DIO | tojson }}
    {%- if params.intensity is defined %}
      intensity: {{ params.intensity }}
    {%- endif %}
    {%- if params.update_interval is defined %}
      update_interval: {{ params.update_interval }}
    {%- endif %}
    {%- if params.lambda_ is defined %}
      lambda: {{ params.lambda_ | tojson }}
    {%- endif %}

params_schema:
  intensity:
    type: integer
    minimum: 0
    maximum: 7
    default: 5
  update_interval:
    type: string
    default: "1s"

notes: "All-in-one module: 8 7-segment digits, 8 red LEDs, 8 momentary buttons. Buttons surface as a `binary_sensor: tm1638` (`key: 0..7`) and the LEDs as `switch: tm1638` (`led: 0..7`); the library template only emits the display block. The bus is bit-banged and not 5V-tolerant, so always run the module from 3V3 if your MCU is 3V3 -- many clones tolerate it."
# KiCad symbol mapping (0.9). Generic 5-pin header captures the
# TM1638 LED + key-scan module (VCC, GND, STB, CLK, DIO).
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x05
  value: TM1638
