id: xpt2046
name: XPT2046 resistive touchscreen controller (SPI)
category: touchscreen
use_cases: [touchscreen, dashboard_input, kiosk]
aliases: [ads7843, tsc2046]

electrical:
  vcc_min: 2.7
  vcc_max: 5.25
  current_ma_typical: 1
  current_ma_peak: 2
  pins:
    - {role: VCC,  kind: power}
    - {role: GND,  kind: ground}
    - {role: SCK,  kind: spi_clk}
    - {role: MOSI, kind: spi_mosi}
    - {role: MISO, kind: spi_miso}
    - {role: CS,   kind: spi_cs,     voltage: 3.3}
    - {role: IRQ,  kind: digital_out, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [spi]
  yaml_template: |
    touchscreen:
      platform: xpt2046
      id: {{ id }}
      cs_pin: {{ pins.CS | tojson }}
      interrupt_pin: {{ pins.IRQ | tojson }}
      spi_id: {{ bus.id }}
    {%- if params.update_interval is defined %}
      update_interval: {{ params.update_interval }}
    {%- endif %}
    {%- if params.threshold is defined %}
      threshold: {{ params.threshold }}
    {%- endif %}
    {%- if params.transform is defined %}
      transform: {{ params.transform | tojson }}
    {%- endif %}
    {%- if params.calibration is defined %}
      calibration: {{ params.calibration | tojson }}
    {%- endif %}

params_schema:
  update_interval:
    type: string
    default: "50ms"
  threshold:
    type: integer
    default: 400
  transform:
    type: object
    description: "{ swap_xy: bool, mirror_x: bool, mirror_y: bool }"
  calibration:
    type: object
    description: "{ x_min: int, x_max: int, y_min: int, y_max: int } -- raw ADC values for the four corners of the touch panel."

notes: "Lives on a typical 3.5\" Pi-style display alongside the ILI9486 panel and shares the same SPI bus with its own CS. Calibration values vary panel-to-panel: log raw values in a lambda for one device of each model, then bake them into the library entry's params_schema defaults. The interrupt pin should support edge interrupts (avoid ESP8266 GPIO16)."
# KiCad symbol mapping (0.9). Resistive touch controller; 5-pin SPI
# breakout (VCC, GND, CLK, MOSI, MISO with optional CS, IRQ, T_DO).
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x05
  value: XPT2046
