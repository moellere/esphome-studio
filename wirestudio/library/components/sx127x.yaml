id: sx127x
name: Semtech SX1276/SX1278 LoRa radio (SPI)
category: radio
use_cases: [lora, lpwan, mesh, point_to_point]
aliases: [sx1276, sx1278, rfm95]

electrical:
  vcc_min: 1.8
  vcc_max: 3.7
  current_ma_typical: 12
  current_ma_peak: 130
  pins:
    - {role: VCC,   kind: power}
    - {role: GND,   kind: ground}
    - {role: SCK,   kind: spi_clk}
    - {role: MISO,  kind: spi_miso}
    - {role: MOSI,  kind: spi_mosi}
    - {role: CS,    kind: spi_cs,     voltage: 3.3}
    - {role: RST,   kind: digital_in, voltage: 3.3}
    - {role: DIO0,  kind: digital_out, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}
    - {kind: capacitor, value: "10uF",  between: [VCC, GND], purpose: bulk decoupling on TX}

esphome:
  required_components: [spi]
  yaml_template: |
    sx127x:
      cs_pin: {{ pins.CS | tojson }}
      rst_pin: {{ pins.RST | tojson }}
      dio0_pin: {{ pins.DIO0 | tojson }}
      spi_id: {{ bus.id }}
    {%- if params.frequency is defined %}
      frequency: {{ params.frequency }}
    {%- endif %}
    {%- if params.modulation is defined %}
      modulation: {{ params.modulation }}
    {%- endif %}
    {%- if params.bandwidth is defined %}
      bandwidth: {{ params.bandwidth }}
    {%- endif %}
    {%- if params.spreading_factor is defined %}
      spreading_factor: {{ params.spreading_factor }}
    {%- endif %}
    {%- if params.coding_rate is defined %}
      coding_rate: {{ params.coding_rate }}
    {%- endif %}
    {%- if params.preamble_size is defined %}
      preamble_size: {{ params.preamble_size }}
    {%- endif %}
    {%- if params.sync_value is defined %}
      sync_value: {{ params.sync_value }}
    {%- endif %}
    {%- if params.crc_enable is defined %}
      crc_enable: {{ params.crc_enable | tojson }}
    {%- endif %}
    {%- if params.pa_pin is defined %}
      pa_pin: {{ params.pa_pin }}
    {%- endif %}
    {%- if params.pa_power is defined %}
      pa_power: {{ params.pa_power }}
    {%- endif %}
    {%- if params.rx_start is defined %}
      rx_start: {{ params.rx_start | tojson }}
    {%- endif %}
    {%- if params.on_packet is defined %}
      on_packet: {{ params.on_packet | tojson }}
    {%- endif %}

params_schema:
  frequency:        { type: integer, description: "Carrier frequency in Hz, e.g. 915000000 (US) or 868000000 (EU)" }
  modulation:       { type: string, enum: [LORA, FSK, OOK], default: LORA }
  bandwidth:        { type: string, default: "125_0kHz" }
  spreading_factor: { type: integer, minimum: 6, maximum: 12, default: 7 }
  coding_rate:      { type: string, enum: ["CR_4_5","CR_4_6","CR_4_7","CR_4_8"], default: "CR_4_5" }
  preamble_size:    { type: integer, default: 8 }
  sync_value:       { type: integer }
  crc_enable:       { type: boolean, default: true }
  pa_pin:           { type: string, enum: [BOOST, RFO], default: BOOST }
  pa_power:         { type: integer, minimum: 2, maximum: 20, default: 17 }
  rx_start:         { type: boolean, default: true }

notes: "ESPHome's `sx127x` is a singleton. The module typically needs a 10uF bulk cap close to VCC because TX bursts pull >100mA momentarily. Frequency must match a band legal in your region."
# KiCad symbol mapping (0.9 schematic export). Generic SX1276 covers
# the SX1272/SX1278 variants with the same pinout.
kicad:
  symbol_lib: RF
  symbol: SX1276
  pin_map:
    VCC: VDD
