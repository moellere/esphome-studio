id: adc
name: Generic analog input
category: sensor
use_cases: [battery_voltage, potentiometer, ldr, generic_analog]
aliases: [analog_in, voltage_divider]

electrical:
  vcc_min: 0.0
  vcc_max: 0.0
  current_ma_typical: 0
  current_ma_peak: 0
  pins:
    - role: IN
      kind: analog_in
      voltage: 3.3
  passives: []

esphome:
  required_components: []
  yaml_template: |
    sensor:
      - platform: adc
        pin: {{ pins.IN | tojson }}
        name: "{{ label }}"
        id: {{ id }}
    {%- if params.attenuation is defined %}
        attenuation: {{ params.attenuation }}
    {%- endif %}
    {%- if params.update_interval is defined %}
        update_interval: {{ params.update_interval }}
    {%- endif %}
    {%- if params.unit_of_measurement is defined %}
        unit_of_measurement: "{{ params.unit_of_measurement }}"
    {%- endif %}
    {%- if params.accuracy_decimals is defined %}
        accuracy_decimals: {{ params.accuracy_decimals }}
    {%- endif %}
    {%- if params.filters is defined %}
        filters: {{ params.filters | tojson }}
    {%- endif %}
    {%- if params.on_value is defined %}
        on_value: {{ params.on_value | tojson }}
    {%- endif %}
    {%- if params.on_value_range is defined %}
        on_value_range: {{ params.on_value_range | tojson }}
    {%- endif %}

params_schema:
  attenuation:
    type: string
    enum: ["0db", "2.5db", "6db", "11db", auto]
    default: "11db"
    description: "ESP32 only. 11db caps the readable range at ~3.3V; auto picks per-sample."
  update_interval:
    type: string
    default: "60s"
  unit_of_measurement:
    type: string
    default: V
  accuracy_decimals:
    type: integer

notes: "ESP8266 only has one ADC pin (A0) and reads 0-1.0V via the onboard divider on most dev boards (3.2V max at the screw terminal on a D1 Mini / NodeMCU). ESP32 ADC2 conflicts with WiFi; the pin solver prefers ADC1 and surfaces a warning if you pin to ADC2. For battery monitoring, multiply by your divider ratio in `filters: - multiply: ...`."
# KiCad symbol mapping (0.9). The `adc` ESPHome platform reads an
# analog GPIO -- it isn't a physical part of its own. Single-pin
# header marks the sense net so the schematic shows where the
# analog source enters the board.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x01
  value: ADC sense
