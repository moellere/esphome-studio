esphome:
  name: nextion-thermostat
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
uart:
- id: nextion_uart
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 9600
display:
- platform: nextion
  id: screen
  uart_id: nextion_uart
  update_interval: 10s
  brightness: 60%
sensor:
- platform: sht3xd
  i2c_id: i2c0
  address: '0x44'
  update_interval: 60s
  temperature:
    name: Room Temperature
  humidity:
    name: Room Humidity
