esphome:
  name: esp32-audio
esp32:
  board: nodemcu-32s
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
spi:
- id: spi0
  clk_pin: GPIO18
  mosi_pin: GPIO23
i2s_audio:
  i2s_lrclk_pin: GPIO33
  i2s_bclk_pin: GPIO25
media_player:
- platform: i2s_audio
  name: Esp32 Audio Media Player
  id: amp
  dac_type: external
  i2s_dout_pin: GPIO32
  mode: stereo
display:
- platform: st7789v
  spi_id: spi0
  cs_pin: GPIO5
  dc_pin: GPIO17
  reset_pin: GPIO22
  backlight_pin: GPIO16
  id: screen
  model: Custom
  width: 240
  height: 320
  offset_width: 0
  offset_height: 0
  rotation: 270
  lambda: |
    it.rectangle(0,  0, it.get_width(), it.get_height(), id(my_blue));
    it.rectangle(0, 20, it.get_width(), it.get_height(), id(my_blue));
    it.strftime((240 / 2), (140 / 4) * 1 + 5, id(arial_12), id(my_gray), TextAlign::CENTER, "%Y-%m-%d", id(esptime).now());
    it.strftime((240 / 2), (140 / 4) * 2 + 5, id(arial_24), id(my_gray), TextAlign::CENTER, "%H:%M:%S", id(esptime).now());
    it.print(5, 5, id(arial_12), id(my_yellow), TextAlign::TOP_LEFT, "ESPHome");
switch:
- platform: gpio
  pin: GPIO26
  name: Esp32 Audio Mute
  id: mute
  icon: mdi:volume-mute
- platform: gpio
  pin: GPIO4
  name: Backlight
  id: backlight
- platform: restart
  name: Esp32 Audio Restart
  id: reboot
status_led:
  pin:
    number: GPIO14
    inverted: true
binary_sensor:
- platform: status
  name: Node Status
  id: system_status
time:
- platform: homeassistant
  id: esptime
color:
- id: my_red
  red: 100%
  green: 0%
  blue: 0%
- id: my_yellow
  red: 100%
  green: 100%
  blue: 0%
- id: my_green
  red: 0%
  green: 100%
  blue: 0%
- id: my_blue
  red: 0%
  green: 0%
  blue: 100%
- id: my_gray
  red: 50%
  green: 50%
  blue: 50%
font:
- file: gfonts://Roboto
  id: arial_48
  size: 48
- file: gfonts://Roboto
  id: arial_24
  size: 24
- file: gfonts://Roboto
  id: arial_12
  size: 12
