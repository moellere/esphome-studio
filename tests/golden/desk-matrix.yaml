esphome:
  name: desk-matrix
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
light:
- platform: esp32_rmt_led_strip
  rgb_order: GRB
  pin: GPIO13
  num_leds: 64
  chipset: WS2812
  name: Desk matrix
  id: matrix
