esphome:
  name: keypad
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 100kHz
pcf8574:
- id: kpd_hub
  i2c_id: i2c0
  address: '0x20'
  pcf8575: false
binary_sensor:
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 0
    mode: INPUT
    inverted: true
  name: Keypad btn_1
  id: btn_1
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 1
    mode: INPUT
    inverted: true
  name: Keypad btn_2
  id: btn_2
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 2
    mode: INPUT
    inverted: true
  name: Keypad btn_3
  id: btn_3
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 3
    mode: INPUT
    inverted: true
  name: Keypad btn_4
  id: btn_4
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 4
    mode: INPUT
    inverted: true
  name: Keypad btn_5
  id: btn_5
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 5
    mode: INPUT
    inverted: true
  name: Keypad btn_6
  id: btn_6
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 6
    mode: INPUT
    inverted: true
  name: Keypad btn_7
  id: btn_7
- platform: gpio
  pin:
    pcf8574: kpd_hub
    number: 7
    mode: INPUT
    inverted: true
  name: Keypad btn_8
  id: btn_8
