esphome:
  name: parking-distance
esp8266:
  board: nodemcuv2
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 100kHz
sensor:
- platform: vl53l0x
  i2c_id: i2c0
  address: '0x29'
  name: Parking distance Distance
  update_interval: 1s
  long_range: false
  timeout: 200ms
