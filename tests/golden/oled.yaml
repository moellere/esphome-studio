esphome:
  name: oled
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 100kHz
display:
- platform: ssd1306_i2c
  model: SSD1306 128x64
  address: '0x3C'
  i2c_id: i2c0
  id: oled1
  reset_pin: D0
  update_interval: 2s
  lambda: |
    it.strftime(0, 11, id(font1), "Time: %H:%M", id(time1).now());
    it.strftime(0, 23, id(font1), "Date: %d.%m.%Y", id(time1).now());
    it.printf(0, 35, id(font1),  WiFi.localIP().toString().c_str());
time:
- platform: homeassistant
  id: time1
font:
- file: common/fonts/arial.ttf
  id: font1
  size: 10
sensor:
- platform: uptime
  name: oled System Uptime
- platform: wifi_signal
  name: oled WiFi Signal
  update_interval: 15s
