esphome:
  name: bluemotion1
  on_boot:
    then:
    - light.turn_on: led1
    - delay: 2s
    - light.turn_off: led1
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
binary_sensor:
- platform: gpio
  pin: GPIO4
  name: Blue Motion
  device_class: motion
  filters:
  - delayed_on: 40ms
  on_press:
  - then:
    - light.turn_on:
        id: led1
        brightness: 1.0
  on_release:
  - then:
    - light.turn_off:
        id: led1
light:
- platform: neopixelbus
  variant: 400KBPS
  method: BIT_BANG
  type: RGB
  pin: GPIO14
  num_leds: 1
  name: LED 1
  id: led1
switch:
- platform: restart
  name: Blue Motion Restart
