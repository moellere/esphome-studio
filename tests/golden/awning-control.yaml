esphome:
  name: awningcontrol
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 100kHz
mcp23008:
- id: mcp23008_hub
  address: '0x20'
  i2c_id: i2c0
time:
- platform: homeassistant
  id: homeassistant_time
binary_sensor:
- platform: gpio
  pin:
    mcp23008: mcp23008_hub
    number: 0
    mode: INPUT_PULLUP
    inverted: true
  name: Awning Closed Sensor
  device_class: opening
  id: awning_closed_sensor
- platform: gpio
  pin:
    mcp23008: mcp23008_hub
    number: 1
    mode: INPUT_PULLUP
    inverted: true
  name: Awning Open Sensor
  device_class: opening
  id: awning_open_sensor
- platform: gpio
  pin:
    mcp23008: mcp23008_hub
    number: 2
    mode: INPUT_PULLUP
    inverted: true
  name: Awning Out
  id: out_button
  on_press:
    then:
    - if:
        condition:
          binary_sensor.is_off: awning_open_sensor
        then:
        - cover.open: awning_cover
        else:
        - cover.stop: awning_cover
  on_release:
  - cover.stop: awning_cover
- platform: gpio
  pin:
    mcp23008: mcp23008_hub
    number: 3
    mode: INPUT_PULLUP
    inverted: true
  name: Awning In
  id: in_button
  on_press:
    then:
    - if:
        condition:
          binary_sensor.is_off: awning_closed_sensor
        then:
        - cover.close: awning_cover
        else:
        - cover.stop: awning_cover
  on_release:
  - cover.stop: awning_cover
output:
- platform: esp8266_pwm
  pin: D5
  frequency: 1000 Hz
  id: out_pwm
- platform: esp8266_pwm
  pin: D6
  frequency: 1000 Hz
  id: in_pwm
switch:
- platform: gpio
  pin:
    mcp23008: mcp23008_hub
    number: 7
    mode: OUTPUT
    inverted: true
  name: Awning power
  icon: mdi:power-plug
  id: awning_power
- platform: gpio
  pin:
    mcp23008: mcp23008_hub
    number: 6
    mode: OUTPUT
  name: Motor Enable
  id: motor_enable
- platform: restart
  name: Awning Control Restart
cover:
- platform: endstop
  name: Deck Awning
  device_class: awning
  id: awning_cover
  open_endstop: awning_open_sensor
  open_duration: 15s
  close_endstop: awning_closed_sensor
  close_duration: 20s
  max_duration: 20s
  open_action:
  - switch.turn_on: awning_power
  - switch.turn_on: motor_enable
  - output.set_level:
      id: out_pwm
      level: 50%
  close_action:
  - switch.turn_on: awning_power
  - switch.turn_on: motor_enable
  - output.set_level:
      id: in_pwm
      level: 75%
  stop_action:
  - switch.turn_off: motor_enable
  - output.set_level:
      id: in_pwm
      level: 0%
  - output.set_level:
      id: out_pwm
      level: 0%
  - switch.turn_off: awning_power
