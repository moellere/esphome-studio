esphome:
  name: wasserpir
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
binary_sensor:
- platform: gpio
  pin: D2
  name: Wasserstein Motion
  device_class: motion
  filters:
  - delayed_on: 100ms
switch:
- platform: restart
  name: Wasserstein Motion Restart
  id: reboot
time:
- platform: homeassistant
  id: time1
  timezone: America/Chicago
  on_time:
  - seconds: 0
    minutes: 30
    hours: 3
    then:
    - switch.toggle: reboot
