esphome:
  name: smart-plug-v1
esp8266:
  board: esp8285
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
sensor:
- platform: hlw8012
  sel_pin:
    number: GPIO5
    inverted: true
  cf_pin: GPIO4
  cf1_pin: GPIO14
  update_interval: 30s
  model: BL0937
  current_resistor: 0.001 ohm
  voltage_divider: 2351
  current:
    name: Plug Current
  voltage:
    name: Plug Voltage
  power:
    name: Plug Power
  energy:
    name: Plug Energy
switch:
- platform: gpio
  pin: GPIO12
  name: Plug relay
  id: relay
binary_sensor:
- platform: gpio
  pin: GPIO0
  name: Plug button
  id: btn
