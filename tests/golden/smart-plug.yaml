esphome:
  name: smart-plug
esp8266:
  board: esp8285
logger:
  baud_rate: 0
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
uart:
- id: plug_uart
  rx_pin: GPIO3
  tx_pin: GPIO1
  baud_rate: 4800
  parity: EVEN
sensor:
- platform: cse7766
  uart_id: plug_uart
  current:
    name: Plug Current
  voltage:
    name: Plug Voltage
  power:
    name: Plug Power
  energy:
    name: Plug Energy
  apparent_power:
    name: Plug Apparent Power
  power_factor:
    name: Plug Power Factor
switch:
- platform: gpio
  pin: GPIO12
  name: Plug relay
  id: relay
binary_sensor:
- platform: gpio
  pin: GPIO0
  name: Plug button
  id: btn
