id: esp32cam-ai-thinker
name: AI-Thinker ESP32-CAM
mcu: esp32
chip_variant: esp32
framework: arduino
platformio_board: esp32cam
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

# ESP32-WROVER-B with onboard OV2640 camera, microSD slot, and a white
# flash LED. The camera and microSD claim almost every GPIO, leaving
# very little for user IO. Most builds wire only the OV2640 + SD card
# and use UART0 (programming header) for everything else.
#
# Camera bus (claimed):
#   GPIO0  = XCLK   (also boot strap; pull LOW to enter download mode)
#   GPIO5  = D1
#   GPIO18 = D2
#   GPIO19 = D3
#   GPIO21 = D4
#   GPIO22 = PCLK
#   GPIO23 = HREF
#   GPIO25 = VSYNC
#   GPIO26 = SIOD (camera I2C SDA)
#   GPIO27 = SIOC (camera I2C SCL)
#   GPIO32 = PWDN
#   GPIO34 = D6 (input-only)
#   GPIO35 = D7 (input-only)
#   GPIO36 = D8 (input-only)
#   GPIO39 = D9 (input-only)
#
# microSD bus (SD-MMC; claimed if SD is enabled):
#   GPIO2  = HS2_DATA0
#   GPIO4  = HS2_DATA1 (also drives the FLASH LED -- pull HIGH to flash)
#   GPIO12 = HS2_DATA2 (also strap; LOW = 3.3V flash, HIGH can damage)
#   GPIO13 = HS2_DATA3
#   GPIO14 = HS2_CLK
#   GPIO15 = HS2_CMD (also strap)
#
# Free for user IO:
#   GPIO1 (TX0), GPIO3 (RX0), GPIO16. If the SD card is disabled and
#   used in 1-bit mode, GPIO12, GPIO13, GPIO14, GPIO15 also become
#   available with the strap caveats noted in esp32-devkitc-v4.yaml.
gpio_capabilities:
  GPIO0:  [boot, strap, boot_high, camera_xclk, adc, adc2]
  GPIO1:  [gpio, uart_tx, serial_tx]
  GPIO2:  [gpio, sd_data0, strap, boot_low, adc, adc2]
  GPIO3:  [gpio, uart_rx, serial_rx]
  GPIO4:  [gpio, sd_data1, flash_led, adc, adc2, pwm]
  GPIO5:  [gpio, camera_data, strap, boot_high]
  GPIO12: [gpio, sd_data2, adc, adc2, strap, boot_low]
  GPIO13: [gpio, sd_data3, adc, adc2, pwm]
  GPIO14: [gpio, sd_clk, adc, adc2, pwm]
  GPIO15: [gpio, sd_cmd, adc, adc2, strap, boot_high]
  GPIO16: [gpio]
  GPIO18: [gpio, camera_data]
  GPIO19: [gpio, camera_data]
  GPIO21: [gpio, camera_data]
  GPIO22: [gpio, camera_pclk]
  GPIO23: [gpio, camera_href]
  GPIO25: [gpio, camera_vsync, dac, adc, adc2]
  GPIO26: [gpio, camera_sda, dac, adc, adc2]
  GPIO27: [gpio, camera_scl, adc, adc2, pwm]
  GPIO32: [gpio, camera_pwdn, adc, adc1, pwm]
  GPIO34: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
  GPIO35: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
  GPIO36: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
  GPIO39: [gpio, camera_data, adc, adc1, input_only, no_pull_internal]
