id: esp01_1m
name: ESP-01S 1MB module / Sonoff Basic
mcu: esp8266
chip_variant: esp8266
framework: arduino
platformio_board: esp01_1m
flash_size_mb: 1

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

# ESP-01S exposes only a handful of GPIOs. Sonoff Basic devices wire
# them to specific functions: GPIO0 = BUTTON (boot strap), GPIO12 = RELAY,
# GPIO13 = STATUS_LED. See wemos-d1-mini.yaml for the tag legend.
gpio_capabilities:
  GPIO0:  [gpio, strap, button, boot_high, pull_up_external]
  GPIO1:  [gpio, uart_tx, serial_tx]
  GPIO2:  [gpio, strap, builtin_led, boot_high, pull_up_external]
  GPIO3:  [gpio, uart_rx, serial_rx]
  GPIO12: [gpio]
  GPIO13: [gpio]
  GPIO14: [gpio]
  GPIO15: [gpio, strap, boot_low, pull_down_external]
  GPIO16: [gpio, no_pwm, no_i2c, no_interrupt]
# KiCad symbol mapping (0.9 schematic export).
kicad:
  symbol_lib: RF_Module
  symbol: ESP-01
