id: wemos-d1-mini
name: WeMos D1 Mini
mcu: esp8266
chip_variant: esp8266
framework: arduino
platformio_board: d1_mini
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

default_buses:
  i2c: {sda: D2, scl: D1}
  spi: {clk: D5, miso: D6, mosi: D7}

# D-labels are how ESPHome refers to D1 Mini pins. Underlying GPIO in parens.
# Tags layered on top of capability tags (gpio/pwm/adc/...):
#   boot_high / boot_low      - strap pin: must be at this level at boot
#   pull_up_external          - board has a fixed pull-up (e.g., 10K to VCC)
#   pull_down_external        - board has a fixed pull-down (e.g., 10K to GND)
#   serial_tx / serial_rx     - shared with the USB serial console
#   no_pwm / no_i2c           - functional restrictions on this pin
#   adc_max_1v                - ADC pin with a 1.0V max input ceiling
gpio_capabilities:
  D0:  [gpio, no_pwm, no_i2c, no_interrupt]               # GPIO16 (only pin with internal pull-down only)
  D1:  [gpio, i2c_scl]                                     # GPIO5
  D2:  [gpio, i2c_sda]                                     # GPIO4
  D3:  [gpio, strap, boot_high, pull_up_external]          # GPIO0  (10k pull-up; boot mode pin)
  D4:  [gpio, strap, builtin_led, boot_high, pull_up_external] # GPIO2
  D5:  [gpio, spi_clk, pwm]                                # GPIO14
  D6:  [gpio, spi_miso, pwm]                               # GPIO12
  D7:  [gpio, spi_mosi, pwm]                               # GPIO13
  D8:  [gpio, spi_cs, strap, boot_low, pull_down_external] # GPIO15 (10k pull-down)
  RX:  [gpio, uart_rx, serial_rx]                          # GPIO3
  TX:  [gpio, uart_tx, serial_tx]                          # GPIO1
  A0:  [adc, input_only, adc_max_1v]                       # max 1.0V via onboard divider
