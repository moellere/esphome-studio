id: esp32-devkitc-v4
name: ESP32-DevKitC-V4
mcu: esp32
chip_variant: esp32
framework: arduino
platformio_board: esp32dev
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

default_buses:
  i2c: {sda: GPIO21, scl: GPIO22}
  spi: {clk: GPIO18, miso: GPIO19, mosi: GPIO23}

# See wemos-d1-mini.yaml for the tag legend. ESP32 strap pin behavior:
#   GPIO0  = boot mode (HIGH for normal, LOW for download)
#   GPIO2  = combined with GPIO0 for download mode (must be LOW or floating)
#   GPIO5  = SDIO timing select (HIGH at boot is the typical default)
#   GPIO12 = flash voltage select (LOW for 3.3V flash; HIGH = 1.8V can damage)
#   GPIO15 = boot message print (HIGH = print, LOW = silent)
# GPIO34/35/36/39 are input-only and have no internal pull-up/down.
#
# ADC unit tags: classic ESP32 splits its ADCs into ADC1 (GPIO32-39) and
# ADC2 (GPIO0,2,4,12-15,25-27). When WiFi is active the ADC2 unit is
# claimed by the WiFi driver and analog reads on ADC2 pins return errors
# or stale values. Since ESPHome devices run WiFi unconditionally, the
# compatibility checker warns whenever an analog_in connection lands on
# an `adc2`-tagged pin and the pin solver prefers `adc1`.
gpio_capabilities:
  GPIO0:  [boot, strap, boot_high, adc, adc2]
  GPIO1:  [gpio, uart_tx, serial_tx]
  GPIO2:  [strap, gpio, boot_low, adc, adc2]
  GPIO3:  [gpio, uart_rx, serial_rx]
  GPIO4:  [gpio, adc, adc2, pwm]
  GPIO5:  [gpio, strap, spi_cs, boot_high]
  GPIO12: [gpio, adc, adc2, strap, boot_low]
  GPIO13: [gpio, adc, adc2, pwm]
  GPIO14: [gpio, adc, adc2, pwm]
  GPIO15: [gpio, adc, adc2, strap, boot_high]
  GPIO16: [gpio]
  GPIO17: [gpio]
  GPIO18: [gpio, spi_clk]
  GPIO19: [gpio, spi_miso]
  GPIO21: [gpio, i2c_sda]
  GPIO22: [gpio, i2c_scl]
  GPIO23: [gpio, spi_mosi]
  GPIO25: [gpio, dac, adc, adc2]
  GPIO26: [gpio, dac, adc, adc2]
  GPIO27: [gpio, adc, adc2, pwm]
  GPIO32: [gpio, adc, adc1, pwm]
  GPIO33: [gpio, adc, adc1, pwm]
  GPIO34: [gpio, adc, adc1, input_only, no_pull_internal]
  GPIO35: [gpio, adc, adc1, input_only, no_pull_internal]
  GPIO36: [gpio, adc, adc1, input_only, no_pull_internal]
  GPIO39: [gpio, adc, adc1, input_only, no_pull_internal]

# Enclosure geometry (mm). 38-pin ESP32-DevKitC V4. Length runs along
# +X (54.4mm); width along +Y (28.6mm). Micro-USB on short_a (x=0),
# centred. Two mounting holes near the short edges, between the headers.
enclosure:
  pcb:
    length_mm: 54.4
    width_mm: 28.6
    thickness_mm: 1.6
  mount_holes:
    - {x_mm:  3.0,  y_mm: 14.3,  hole_diameter_mm: 3.2}
    - {x_mm: 51.4,  y_mm: 14.3,  hole_diameter_mm: 3.2}
  ports:
    - kind: usb_micro
      edge: short_a
      offset_mm: 10.3          # centred on the 28.6mm short edge
      width_mm: 8.0
      height_mm: 3.0
      height_above_pcb_mm: 1.5
  component_height_max_mm: 13.0
# KiCad symbol mapping (0.9 schematic export).
kicad:
  symbol_lib: MCU_Module
  symbol: ESP32-DevKitC-V4
  footprint: Module:Espressif_ESP32-DevKitC-V4
