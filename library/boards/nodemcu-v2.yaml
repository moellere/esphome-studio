id: nodemcu-v2
name: NodeMCU v2 (ESP-12E/F)
mcu: esp8266
chip_variant: esp8266
framework: arduino
platformio_board: nodemcuv2
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

default_buses:
  i2c: {sda: D2, scl: D1}
  spi: {clk: D5, miso: D6, mosi: D7}

# D-labels match WeMos D1 Mini for the overlapping 9 GPIOs;
# NodeMCU v2 also breaks out D9-D12 (RX, TX, MISO, MOSI dupes).
# Tags layered on top of capability tags -- see wemos-d1-mini.yaml for the
# canonical legend. NodeMCU v2's A0 has the same 1.0V divider.
gpio_capabilities:
  D0:  [gpio, no_pwm, no_i2c, no_interrupt]                # GPIO16
  D1:  [gpio, i2c_scl]                                     # GPIO5
  D2:  [gpio, i2c_sda]                                     # GPIO4
  D3:  [gpio, strap, boot_high, pull_up_external]          # GPIO0
  D4:  [gpio, strap, builtin_led, boot_high, pull_up_external] # GPIO2
  D5:  [gpio, spi_clk, pwm]                                # GPIO14
  D6:  [gpio, spi_miso, pwm]                               # GPIO12
  D7:  [gpio, spi_mosi, pwm]                               # GPIO13
  D8:  [gpio, spi_cs, strap, boot_low, pull_down_external] # GPIO15
  D9:  [gpio, uart_rx, serial_rx]                          # GPIO3
  D10: [gpio, uart_tx, serial_tx]                          # GPIO1
  A0:  [adc, input_only, adc_max_1v]

# Enclosure geometry (mm). NodeMCU v2 (Amica) -- 48 x 26 mm with
# Micro-USB centred on the short_a edge. The legacy v1 LoLin variant
# is wider; v2 is the current Amica board.
enclosure:
  pcb:
    length_mm: 48.0
    width_mm: 26.0
    thickness_mm: 1.6
  mount_holes:
    - {x_mm:  2.5,  y_mm: 13.0,  hole_diameter_mm: 3.2}
    - {x_mm: 45.5,  y_mm: 13.0,  hole_diameter_mm: 3.2}
  ports:
    - kind: usb_micro
      edge: short_a
      offset_mm: 9.0
      width_mm: 8.0
      height_mm: 3.0
      height_above_pcb_mm: 1.5
  component_height_max_mm: 13.0
# KiCad symbol mapping (0.9 schematic export). KiCad doesn't ship a
# dedicated NodeMCU v2 module symbol; the closest stand-in is the
# generic ESP-12 module footprint at the right pinout.
kicad:
  symbol_lib: MCU_Module
  symbol: NodeMCU-1.0
