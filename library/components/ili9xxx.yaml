id: ili9xxx
name: ILI9341 / ILI9486 / ILI9488 SPI TFT display
category: display
use_cases: [tft, color_display, dashboard, touchscreen_panel]
aliases: [ili9341, ili9486, ili9488, ili9342]

electrical:
  vcc_min: 3.0
  vcc_max: 3.6
  current_ma_typical: 80
  current_ma_peak: 220
  pins:
    - {role: VCC,       kind: power}
    - {role: GND,       kind: ground}
    - {role: SCK,       kind: spi_clk}
    - {role: MOSI,      kind: spi_mosi}
    - {role: MISO,      kind: spi_miso}
    - {role: CS,        kind: spi_cs,     voltage: 3.3}
    - {role: DC,        kind: digital_in, voltage: 3.3}
    - {role: RESET,     kind: digital_in, voltage: 3.3}
    - {role: BACKLIGHT, kind: digital_in, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}
    - {kind: capacitor, value: "10uF",  between: [VCC, GND], purpose: bulk decoupling}

esphome:
  required_components: [spi]
  yaml_template: |
    display:
      - platform: ili9xxx
        model: {{ params.model | default('ILI9341') }}
        spi_id: {{ bus.id }}
        cs_pin: {{ pins.CS | tojson }}
        dc_pin: {{ pins.DC | tojson }}
        reset_pin: {{ pins.RESET | tojson }}
        id: {{ id }}
    {%- if params.invert_colors is defined %}
        invert_colors: {{ params.invert_colors | tojson }}
    {%- endif %}
    {%- if params.color_order is defined %}
        color_order: {{ params.color_order }}
    {%- endif %}
    {%- if params.rotation is defined %}
        rotation: {{ params.rotation }}
    {%- endif %}
    {%- if params.update_interval is defined %}
        update_interval: {{ params.update_interval }}
    {%- endif %}
    {%- if params.lambda_ is defined %}
        lambda: {{ params.lambda_ | tojson }}
    {%- endif %}

params_schema:
  model:
    type: string
    enum: [M5STACK, M5CORE, TFT_2_4, TFT_2_4R, ILI9341, ILI9342, ILI9481, ILI9486, ILI9488, ILI9488_A, ST7796]
    default: ILI9341
  invert_colors:
    type: boolean
  color_order:
    type: string
    enum: [bgr, rgb]
  rotation:
    type: integer
    enum: [0, 90, 180, 270]
    default: 0
  update_interval:
    type: string
    default: "5s"

notes: "MISO is required only if your code reads back from the panel (touch-on-the-same-bus boards do, the typical ESPHome lambda flow does not). The 3.5\" Pi-style ILI9486 panels need an `init_sequence` override -- copy from the in-tree 35display.yaml for the Waveshare/Adafruit-style boards. Backlight on most clones is a passive 5V LED; tie it to a GPIO via `backlight_pin` in a `light:` block if you need PWM dimming."
# KiCad symbol mapping (0.9). Generic header for the ILI9341 / 9488 /
# 9486 family of SPI displays. Pin count varies (8-14) by breakout;
# 14 is the upper bound that covers most commodity boards.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x14
  value: ILI9xxx
