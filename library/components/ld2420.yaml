id: ld2420
name: Hi-Link LD2420 24GHz mmWave presence sensor
category: binary_sensor
use_cases: [presence, occupancy, motion, distance]
aliases: [ld2410, ld2412, hlk-ld2420]

electrical:
  vcc_min: 4.5
  vcc_max: 5.5
  current_ma_typical: 65
  current_ma_peak: 90
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - {role: TX,  kind: uart_tx, voltage: 3.3}
    - {role: RX,  kind: uart_rx, voltage: 3.3}
    # OT2 (digital target presence) pin exists on the module but the
    # ESPHome integration drives everything over UART; omit for 0.1.
  passives:
    - {kind: capacitor, value: "10uF", between: [VCC, GND], purpose: bulk decoupling}

esphome:
  required_components: [uart]
  yaml_template: |
    ld2420:
      uart_id: {{ bus.id }}
      id: {{ id }}
    binary_sensor:
      - platform: ld2420
        has_target:
          name: "{{ label }} Presence"
          device_class: presence
    sensor:
      - platform: ld2420
        moving_distance:
          name: "{{ label }} Moving Distance"

params_schema:
  presence_timeout:
    type: integer
    description: "Seconds with no detection before clearing presence."
  min_gate_distance:
    type: integer
    minimum: 1
    maximum: 16
  max_gate_distance:
    type: integer
    minimum: 1
    maximum: 16

notes: "UART runs at 256000 baud (LD2420) or 256000/115200 (LD2410). Wire the module's TX to the MCU RX and vice versa. ESPHome's `ld2420` integration is a singleton -- one mmWave per device. The sister `ld2410` integration mirrors this template if you swap the platform name."
# KiCad symbol mapping (0.9). 24GHz radar presence sensor; standard
# 4-pin breakout (5V, GND, RX, TX).
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  value: LD2420
