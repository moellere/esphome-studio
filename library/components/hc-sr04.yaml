id: hc-sr04
name: HC-SR04 ultrasonic distance sensor
category: sensor
use_cases: [distance, level, proximity]
aliases: [hc-sr04p, hy-srf05]

electrical:
  vcc_min: 4.5
  vcc_max: 5.5
  current_ma_typical: 15
  current_ma_peak: 30
  pins:
    - {role: VCC,     kind: power}
    - {role: GND,     kind: ground}
    - {role: TRIGGER, kind: digital_out, voltage: 3.3}
    - {role: ECHO,    kind: digital_in,  voltage: 5.0}
  passives: []

esphome:
  required_components: []
  yaml_template: |
    sensor:
      - platform: ultrasonic
        trigger_pin: {{ pins.TRIGGER | tojson }}
        echo_pin: {{ pins.ECHO | tojson }}
        name: "{{ label }}"
        id: {{ id }}
    {%- if params.update_interval is defined %}
        update_interval: {{ params.update_interval }}
    {%- endif %}
    {%- if params.unit_of_measurement is defined %}
        unit_of_measurement: "{{ params.unit_of_measurement }}"
    {%- endif %}
    {%- if params.timeout is defined %}
        timeout: {{ params.timeout }}
    {%- endif %}
    {%- if params.filters is defined %}
        filters: {{ params.filters | tojson }}
    {%- endif %}
    {%- if params.on_value is defined %}
        on_value: {{ params.on_value | tojson }}
    {%- endif %}

params_schema:
  update_interval: { type: string, default: "60s" }
  unit_of_measurement: { type: string, default: "m" }
  timeout: { type: string, default: "2m" }

notes: "ECHO pin is 5V on bare HC-SR04. ESP boards are not 5V-tolerant; add a voltage divider or use HC-SR04P (3.3V) variant. ESPHome's ultrasonic platform internally limits range to ~4m."
# KiCad symbol mapping (0.9 schematic export). Generic 4-pin header
# (VCC, TRIG, ECHO, GND).
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  value: HC-SR04
