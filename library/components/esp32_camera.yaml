id: esp32_camera
name: ESP32 OV2640 / OV7670 / OV5640 camera
category: camera
use_cases: [webcam, snapshot, motion_capture, security_cam]
aliases: [ov2640, ov7670, ov5640, esp32cam]

electrical:
  vcc_min: 3.0
  vcc_max: 3.6
  current_ma_typical: 90
  current_ma_peak: 310
  # The OV2640 sensor sits on a parallel data bus + I2C control + clock
  # generator, so the "pins" here are role markers for the wiring
  # generator. On boards like the AI-Thinker ESP32-CAM the camera is
  # baked into the board file (see `onboard_peripherals.camera`); on
  # bare modules wired to a generic ESP32 you'll bind every role
  # explicitly.
  pins:
    - {role: VCC,         kind: power}
    - {role: GND,         kind: ground}
    - {role: XCLK,        kind: digital_out, voltage: 3.3}
    - {role: PCLK,        kind: digital_in,  voltage: 3.3}
    - {role: VSYNC,       kind: digital_in,  voltage: 3.3}
    - {role: HREF,        kind: digital_in,  voltage: 3.3}
    - {role: SDA,         kind: i2c_sda}
    - {role: SCL,         kind: i2c_scl}
    - {role: D0,          kind: digital_in, voltage: 3.3}
    - {role: D1,          kind: digital_in, voltage: 3.3}
    - {role: D2,          kind: digital_in, voltage: 3.3}
    - {role: D3,          kind: digital_in, voltage: 3.3}
    - {role: D4,          kind: digital_in, voltage: 3.3}
    - {role: D5,          kind: digital_in, voltage: 3.3}
    - {role: D6,          kind: digital_in, voltage: 3.3}
    - {role: D7,          kind: digital_in, voltage: 3.3}
    - {role: PWDN,        kind: digital_out, voltage: 3.3}
    - {role: RESET,       kind: digital_out, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}
    - {kind: capacitor, value: "10uF",  between: [VCC, GND], purpose: bulk decoupling}

esphome:
  required_components: []
  yaml_template: |
    esp32_camera:
      external_clock:
        pin: {{ pins.XCLK | tojson }}
        frequency: {{ params.xclk_frequency | default('20MHz') }}
      i2c_pins:
        sda: {{ pins.SDA | tojson }}
        scl: {{ pins.SCL | tojson }}
      data_pins: [
        {{ pins.D0 | tojson }}, {{ pins.D1 | tojson }}, {{ pins.D2 | tojson }}, {{ pins.D3 | tojson }},
        {{ pins.D4 | tojson }}, {{ pins.D5 | tojson }}, {{ pins.D6 | tojson }}, {{ pins.D7 | tojson }}
      ]
      vsync_pin: {{ pins.VSYNC | tojson }}
      href_pin: {{ pins.HREF | tojson }}
      pixel_clock_pin: {{ pins.PCLK | tojson }}
    {%- if pins.PWDN is defined %}
      power_down_pin: {{ pins.PWDN | tojson }}
    {%- endif %}
    {%- if pins.RESET is defined %}
      reset_pin: {{ pins.RESET | tojson }}
    {%- endif %}
      name: "{{ label }}"
      resolution: {{ params.resolution | default('800x600') }}
    {%- if params.vertical_flip is defined %}
      vertical_flip: {{ params.vertical_flip | tojson }}
    {%- endif %}
    {%- if params.horizontal_mirror is defined %}
      horizontal_mirror: {{ params.horizontal_mirror | tojson }}
    {%- endif %}
    {%- if params.web_server_ports is defined %}
    esp32_camera_web_server: {{ params.web_server_ports | tojson }}
    {%- endif %}

params_schema:
  xclk_frequency:
    type: string
    enum: ["10MHz", "16MHz", "20MHz"]
    default: "20MHz"
  resolution:
    type: string
    enum: ["160x120", "320x240", "640x480", "800x600", "1024x768", "1280x1024", "1600x1200"]
    default: "800x600"
  vertical_flip:
    type: boolean
  horizontal_mirror:
    type: boolean
  web_server_ports:
    type: array
    description: "Optional `[{ port: 8080, mode: stream }, { port: 8081, mode: snapshot }]` list."

notes: "ESP32 only -- OV2640 needs the dedicated parallel bus + DMA the classic ESP32 / ESP32-S3 expose, and won't work on C3/H2/etc. The sensor pulls >300mA on capture and is intolerant of a sagging 3V3 rail; bring out the 10uF cap on the camera board (most modules already have it). For boards with the camera baked into the board file (AI-Thinker, Wrover, M5Camera, TTGO T-Camera) prefer pinning every camera role to the equivalent `expander_pin: camera` slots from the board's onboard_peripherals."
