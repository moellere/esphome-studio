id: lcd_pcf8574
name: HD44780 character LCD (16x2 / 20x4) via PCF8574 I2C backpack
category: display
use_cases: [text_display, status, dashboard]
aliases: [hd44780, lcd_2004, lcd_1602, lcd_i2c]

electrical:
  vcc_min: 4.5
  vcc_max: 5.5
  current_ma_typical: 25
  current_ma_peak: 60
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - role: SDA
      kind: i2c_sda
      pull_up: {required: true, value: "4.7k", to: VCC}
    - role: SCL
      kind: i2c_scl
      pull_up: {required: true, value: "4.7k", to: VCC}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [i2c]
  yaml_template: |
    display:
      - platform: lcd_pcf8574
        dimensions: {{ params.dimensions | default('20x4') }}
        address: "{{ params.address | default('0x27') }}"
        i2c_id: {{ bus.id }}
        id: {{ id }}
    {%- if params.update_interval is defined %}
        update_interval: {{ params.update_interval }}
    {%- endif %}
    {%- if params.lambda_ is defined %}
        lambda: {{ params.lambda_ | tojson }}
    {%- endif %}

params_schema:
  dimensions:
    type: string
    enum: ["16x2", "20x4"]
    default: "20x4"
  address:
    type: string
    enum: ["0x20", "0x21", "0x22", "0x23", "0x24", "0x25", "0x26", "0x27", "0x3F"]
    default: "0x27"
  update_interval:
    type: string
    default: "1s"

notes: "5V LCD running over a 3.3V I2C bus through a level-shifting PCF8574 backpack. Common backpack addresses are 0x27 (most clones) and 0x3F (some Adafruit-style boards); the in-tree corpus also has 0x26 for a custom variant. Backlight control is exposed as `display.{id}.backlight()` / `no_backlight()`."
# KiCad symbol mapping (0.9). Generic 4-pin header (VCC/GND/SDA/SCL)
# matching the I2C backpack on a 16x2 / 20x4 character LCD.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  value: LCD I2C backpack
