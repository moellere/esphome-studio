id: mcp23008
name: Microchip MCP23008 (8-bit I2C GPIO expander)
category: io_expander
use_cases: [gpio_expansion, switch_inputs, led_outputs]
aliases: [mcp23017]

electrical:
  vcc_min: 1.8
  vcc_max: 5.5
  current_ma_typical: 1
  current_ma_peak: 35
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - role: SDA
      kind: i2c_sda
      pull_up: {required: true, value: "4.7k", to: VCC}
    - role: SCL
      kind: i2c_scl
      pull_up: {required: true, value: "4.7k", to: VCC}
    - {role: RESET, kind: digital_in, voltage: 3.3}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [i2c]
  yaml_template: |
    mcp23008:
      - id: {{ id }}
        address: "{{ params.address | default('0x20') }}"
        i2c_id: {{ bus.id }}

params_schema:
  address:
    type: string
    enum: ["0x20", "0x21", "0x22", "0x23", "0x24", "0x25", "0x26", "0x27"]
    default: "0x20"

notes: "Per-pin direction/mode is configured by the downstream gpio platforms (binary_sensor, switch, output) that reference this hub via `mcp23008: <id>` in their pin block."
