id: apa102
name: APA102 / SK9822 addressable RGB LED strip (SPI / DotStar)
category: light
use_cases: [indicator, status_led, ambient, addressable_strip]
aliases: [sk9822, dotstar, apa107]

electrical:
  vcc_min: 4.5
  vcc_max: 5.5
  current_ma_typical: 30
  current_ma_peak: 60
  pins:
    - {role: VCC,  kind: power}
    - {role: GND,  kind: ground}
    - {role: DI,   kind: digital_in, voltage: 5.0}
    - {role: CI,   kind: digital_in, voltage: 5.0}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}
    - {kind: capacitor, value: "1000uF", between: [VCC, GND], purpose: bulk for strips > 8 LEDs}

esphome:
  required_components: []
  yaml_template: |
    light:
      - platform: fastled_spi
        chipset: {{ params.chipset | default('APA102') }}
        data_pin: {{ pins.DI | tojson }}
        clock_pin: {{ pins.CI | tojson }}
        num_leds: {{ params.num_leds | default(1) }}
        rgb_order: {{ params.rgb_order | default('BGR') }}
        name: "{{ label }}"
        id: {{ id }}
    {%- if params.effects is defined %}
        effects: {{ params.effects | tojson }}
    {%- endif %}
    {%- if params.default_transition_length is defined %}
        default_transition_length: {{ params.default_transition_length }}
    {%- endif %}

params_schema:
  chipset:
    type: string
    enum: [APA102, SK9822]
    default: APA102
  rgb_order:
    type: string
    enum: [RGB, RBG, BRG, BGR, GRB, GBR]
    default: BGR
  num_leds:
    type: integer
    minimum: 1
    default: 1
  default_transition_length:
    type: string
  effects:
    type: array

notes: "DotStar-class strips use a 2-wire (data + clock) SPI-style protocol, so they don't suffer from the 800kHz timing constraints of WS2812B. They share an SPI bus only awkwardly because they don't have a CS pin -- give them dedicated GPIOs rather than mixing on a bus with other SPI devices. Current rises ~60mA per LED at full white; a 1000uF bulk cap close to the strip is recommended above ~8 LEDs."
# KiCad symbol mapping (0.9). APA102 strips ship as 4-wire pigtails
# (VCC, GND, DATA, CLK); the chip itself is also in some KiCad libs as
# `LED:APA102` but the pigtail header captures what the user actually
# solders to.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  value: APA102
