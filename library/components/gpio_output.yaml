id: gpio_output
name: Generic GPIO switch / relay output
category: switch
use_cases: [relay, mosfet, indicator, generic_output]
aliases: [gpio_switch, gpio_relay]

electrical:
  vcc_min: 0.0
  vcc_max: 0.0
  current_ma_typical: 0
  current_ma_peak: 0
  pins:
    - {role: OUT, kind: digital_out, voltage: 3.3}
  passives: []

esphome:
  required_components: []
  yaml_template: |
    switch:
      - platform: gpio
        pin: {{ pins.OUT | tojson }}
        name: "{{ label }}"
        id: {{ id }}
    {%- if params.icon is defined %}
        icon: "{{ params.icon }}"
    {%- endif %}
    {%- if params.restore_mode is defined %}
        restore_mode: {{ params.restore_mode }}
    {%- endif %}
    {%- if params.on_turn_on is defined %}
        on_turn_on: {{ params.on_turn_on | tojson }}
    {%- endif %}
    {%- if params.on_turn_off is defined %}
        on_turn_off: {{ params.on_turn_off | tojson }}
    {%- endif %}

params_schema:
  icon:
    type: string
  restore_mode:
    type: string
    enum: [RESTORE_DEFAULT_OFF, RESTORE_DEFAULT_ON, ALWAYS_OFF, ALWAYS_ON, RESTORE_INVERTED_DEFAULT_OFF, RESTORE_INVERTED_DEFAULT_ON, DISABLED]

notes: "Pin mode (OUTPUT, OUTPUT_OPEN_DRAIN) and inverted are properties of the connection target. For a hardware relay driver, model the relay as a separate downstream component if you need its electrical metadata."
# KiCad symbol mapping (0.9). 2-pin header captures the wired load
# (relay coil, indicator LED, motor leg, etc.). Replace with the
# actual driven part after import.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x02
  value: Output
